<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>시계</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ========== 세계 시계 ========== -->
  <div id="tab-worldclock" class="tab-content active">
    <div class="safe-top"></div>
    <div class="header">
      <div class="header-top">
        <button class="text-btn orange" id="wc-edit-btn">편집</button>
        <button class="icon-btn orange" id="wc-add-btn">
          <svg width="22" height="22" viewBox="0 0 44 44"><path d="M22 8v28M8 22h28" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
        </button>
      </div>
      <h1 class="large-title">세계 시계</h1>
    </div>
    <div class="scroll-area" id="wc-list"></div>
  </div>

  <!-- ========== 알람 ========== -->
  <div id="tab-alarm" class="tab-content">
    <div class="safe-top"></div>
    <div class="header">
      <div class="header-top">
        <button class="text-btn orange" id="al-edit-btn">편집</button>
        <button class="icon-btn orange" id="al-add-btn">
          <svg width="22" height="22" viewBox="0 0 44 44"><path d="M22 8v28M8 22h28" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
        </button>
      </div>
      <h1 class="large-title">알람</h1>
    </div>
    <div class="scroll-area" id="al-list"></div>
  </div>

  <!-- ========== 스톱워치 ========== -->
  <div id="tab-stopwatch" class="tab-content">
    <div class="safe-top"></div>
    <div class="sw-wrap">
      <!-- Swipeable pages -->
      <div class="sw-pages" id="sw-pages">
        <div class="sw-page" id="sw-page-digital">
          <div class="sw-digital-display">
            <span class="sw-digital-time" id="sw-display">00:00<span class="sw-digital-ms">.00</span></span>
          </div>
        </div>
        <div class="sw-page" id="sw-page-analog">
          <div class="sw-dial-area">
            <canvas id="sw-canvas"></canvas>
          </div>
        </div>
      </div>
      <!-- Page dots -->
      <div class="sw-dots">
        <span class="sw-dot active" data-page="0"></span>
        <span class="sw-dot" data-page="1"></span>
      </div>
      <!-- Buttons -->
      <div class="sw-buttons">
        <div class="circle-btn-wrap">
          <div class="circle-btn-ring" id="sw-lap-ring">
            <button class="circle-btn gray" id="sw-lap-btn" disabled>랩</button>
          </div>
        </div>
        <div class="circle-btn-wrap">
          <div class="circle-btn-ring green-ring" id="sw-start-ring">
            <button class="circle-btn green" id="sw-start-btn">시작</button>
          </div>
        </div>
      </div>
      <!-- Laps -->
      <div class="lap-list" id="sw-laps"></div>
    </div>
  </div>

  <!-- ========== 타이머 ========== -->
  <div id="tab-timer" class="tab-content">
    <div class="safe-top"></div>
    <div class="tm-wrap">
      <div class="tm-picker-area" id="tm-picker-area">
        <div class="tm-picker">
          <div class="tm-col-group">
            <div class="tm-col" id="pk-h" data-max="23"></div>
            <span class="tm-col-label">시간</span>
          </div>
          <div class="tm-col-group">
            <div class="tm-col" id="pk-m" data-max="59"></div>
            <span class="tm-col-label">분</span>
          </div>
          <div class="tm-col-group">
            <div class="tm-col" id="pk-s" data-max="59"></div>
            <span class="tm-col-label">초</span>
          </div>
        </div>
        <div class="tm-picker-hl"></div>
      </div>
      <div class="tm-ring-area" id="tm-ring-area" style="display:none;">
        <div class="tm-ring-box">
          <svg class="tm-ring-svg" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="92" fill="none" stroke="#333" stroke-width="3"/>
            <circle cx="100" cy="100" r="92" fill="none" stroke="#FF9F0A" stroke-width="3" stroke-linecap="round" id="tm-ring-circle"
              stroke-dasharray="578.05" stroke-dashoffset="0" transform="rotate(-90 100 100)"/>
          </svg>
          <div class="tm-ring-time" id="tm-ring-time">00:00</div>
        </div>
      </div>
      <div class="tm-sound-row">
        <span>타이머 종료 시</span>
        <span class="tm-sound-val">전파 탐지기 <span class="chevron">›</span></span>
      </div>
      <div class="sw-buttons">
        <div class="circle-btn-wrap">
          <div class="circle-btn-ring">
            <button class="circle-btn gray" id="tm-cancel-btn" disabled>취소</button>
          </div>
        </div>
        <div class="circle-btn-wrap">
          <div class="circle-btn-ring green-ring">
            <button class="circle-btn green" id="tm-start-btn">시작</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== 알람 추가 모달 ========== -->
  <div class="modal" id="al-modal">
    <div class="modal-sheet">
      <div class="modal-header">
        <button class="text-btn orange" id="al-modal-cancel">취소</button>
        <span class="modal-title">알람 추가</span>
        <button class="text-btn orange bold" id="al-modal-save">저장</button>
      </div>
      <div class="al-picker-area">
        <div class="tm-picker al-picker">
          <div class="tm-col-group"><div class="tm-col" id="alpk-h" data-max="12" data-min="1" data-type="hour12"></div></div>
          <div class="tm-col-group"><div class="tm-col" id="alpk-m" data-max="59"></div></div>
          <div class="tm-col-group"><div class="tm-col" id="alpk-ap" data-type="ampm"></div></div>
        </div>
        <div class="tm-picker-hl"></div>
      </div>
      <div class="al-options">
        <div class="al-opt-row"><span>반복</span><span class="al-opt-val">안 함 <span class="chevron">›</span></span></div>
        <div class="al-opt-row"><span>레이블</span><input type="text" class="al-opt-input" id="al-label-input" value="알람"></div>
        <div class="al-opt-row"><span>사운드</span><span class="al-opt-val">전파 탐지기 <span class="chevron">›</span></span></div>
        <div class="al-opt-row last"><span>다시 알림</span><label class="toggle"><input type="checkbox" checked><span class="toggle-track"><span class="toggle-thumb"></span></span></label></div>
      </div>
    </div>
  </div>

  <!-- ========== 도시 선택 모달 ========== -->
  <div class="modal" id="wc-modal">
    <div class="modal-sheet">
      <div class="modal-header">
        <button class="text-btn orange" id="wc-modal-cancel">취소</button>
        <span class="modal-title">도시 선택</span>
        <div style="width:50px"></div>
      </div>
      <div class="search-box">
        <div class="search-field">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 15 15"><circle cx="6.5" cy="6.5" r="5.5" stroke="#8E8E93" stroke-width="1.5" fill="none"/><path d="M10.5 10.5l3.5 3.5" stroke="#8E8E93" stroke-width="1.5" stroke-linecap="round"/></svg>
          <input type="text" placeholder="검색" id="city-search">
        </div>
      </div>
      <div class="city-list" id="city-list"></div>
    </div>
  </div>

  <!-- ========== 탭 바 ========== -->
  <div class="tabbar">
    <button class="tab active" data-tab="worldclock">
      <div class="tab-ico-wrap">
        <!-- Globe outline -->
        <svg class="tab-ico" viewBox="0 0 26 26"><circle cx="13" cy="13" r="11" stroke="currentColor" stroke-width="1.3" fill="none"/><ellipse cx="13" cy="13" rx="5" ry="11" stroke="currentColor" stroke-width="1.1" fill="none"/><path d="M2.5 9.5h21M2.5 16.5h21M13 2v22" stroke="currentColor" stroke-width="1" fill="none"/></svg>
      </div>
      <span>세계 시계</span>
    </button>
    <button class="tab" data-tab="alarm">
      <div class="tab-ico-wrap">
        <!-- Alarm bell -->
        <svg class="tab-ico" viewBox="0 0 26 26"><path d="M5.5 4L3 6.5M20.5 4L23 6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/><path d="M13 3C8.58 3 5 6.58 5 11v4.5L3 18v1h20v-1l-2-2.5V11c0-4.42-3.58-8-8-8z" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M10 20c0 1.66 1.34 3 3 3s3-1.34 3-3" stroke="currentColor" stroke-width="1.3" fill="none"/></svg>
      </div>
      <span>알람</span>
    </button>
    <button class="tab" data-tab="stopwatch">
      <div class="tab-ico-wrap">
        <!-- Stopwatch filled when active -->
        <svg class="tab-ico tab-ico-stopwatch" viewBox="0 0 26 28"><circle cx="13" cy="15.5" r="10" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M13 9v6.5l4 2.5M10.5 2h5M13 2v3.5M21 7l1.5-1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/></svg>
      </div>
      <span>스톱워치</span>
    </button>
    <button class="tab" data-tab="timer">
      <div class="tab-ico-wrap">
        <svg class="tab-ico" viewBox="0 0 26 26"><circle cx="13" cy="13" r="11" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M13 5.5V13h6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/></svg>
      </div>
      <span>타이머</span>
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
